server:
  port: ${ATLAS_WORKFLOW_PORT:8082}

spring:
  application:
    name: workflow-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${ATLAS_DB_HOST:localhost}:${ATLAS_DB_PORT:5432}/${ATLAS_DB_NAME:atlas}?currentSchema=workflow
    username: ${ATLAS_DB_USER:atlas}
    password: ${ATLAS_DB_PASSWORD:atlas}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: workflow
        format_sql: true
    open-in-view: false
  flyway:
    schemas: workflow
    default-schema: workflow
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${ATLAS_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: workflow-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.atlas.*"
  data:
    redis:
      host: ${ATLAS_REDIS_HOST:localhost}
      port: ${ATLAS_REDIS_PORT:6379}

atlas:
  internal:
    api-key: ${ATLAS_INTERNAL_API_KEY:dev-internal-key}
  jwt:
    secret: ${ATLAS_JWT_SECRET:atlas-dev-only-jwt-secret-key-change-in-production-at-least-256-bits}
  rate-limit:
    requests-per-minute: 600
    burst-size: 100
  grpc:
    server:
      enabled: ${ATLAS_GRPC_SERVER_ENABLED:false}
      port: ${ATLAS_GRPC_SERVER_PORT:9095}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: workflow-service
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: ${ATLAS_TEMPO_ENDPOINT:http://localhost:4318/v1/traces}
