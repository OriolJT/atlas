name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build and install all modules (skip tests)
        run: mvn install -DskipTests -q

      - name: Run common module tests
        run: mvn test -pl common

      - name: Run identity-service tests
        run: mvn test -pl identity-service -am
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Run workflow-service tests
        run: mvn test -pl workflow-service -am
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Run worker-service tests
        run: mvn test -pl worker-service -am
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Run audit-service tests
        run: mvn test -pl audit-service -am
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - name: Build JARs
        run: mvn package -DskipTests -q
      - name: Build Docker images
        run: |
          docker build --target identity -t atlas-identity-service:latest .
          docker build --target workflow -t atlas-workflow-service:latest .
          docker build --target worker -t atlas-worker-service:latest .
          docker build --target audit -t atlas-audit-service:latest .
      - name: Verify images
        run: docker images | grep atlas
