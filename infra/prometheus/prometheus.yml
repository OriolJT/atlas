global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Targets use host.docker.internal for host-mode dev (services running on host, Prometheus in Docker).
  # For fully containerized mode (all services in Docker Compose with "app" profile),
  # replace with Docker DNS names:
  #   - targets: ['identity-service:8081']
  #   - targets: ['workflow-service:8082']
  #   - targets: ['worker-service:8083']
  #   - targets: ['audit-service:8084']
  - job_name: 'identity-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
      # - targets: ['identity-service:8081']  # containerized mode
  - job_name: 'workflow-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
      # - targets: ['workflow-service:8082']  # containerized mode
  - job_name: 'worker-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
      # - targets: ['worker-service:8083']  # containerized mode
  - job_name: 'audit-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
      # - targets: ['audit-service:8084']  # containerized mode
