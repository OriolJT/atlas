apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  namespace: atlas
  labels:
    app.kubernetes.io/part-of: atlas
data:
  SPRING_PROFILES_ACTIVE: "production"
  ATLAS_DB_HOST: "postgres"
  ATLAS_DB_PORT: "5432"
  ATLAS_DB_NAME: "atlas"
  ATLAS_DB_USER: "atlas"
  ATLAS_KAFKA_BOOTSTRAP: "kafka:9092"
  ATLAS_REDIS_HOST: "redis"
  ATLAS_REDIS_PORT: "6379"
  ATLAS_JWT_ACCESS_TOKEN_EXPIRY_MINUTES: "15"
  ATLAS_JWT_REFRESH_TOKEN_EXPIRY_DAYS: "7"
