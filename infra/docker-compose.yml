services:

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:8.2.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    restart: on-failure

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  prometheus:
    image: prom/prometheus:v3.11.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

  tempo:
    image: grafana/tempo:2.10.3
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]

  identity-service:
    build:
      context: ..
      dockerfile: Dockerfile
      target: identity
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ATLAS_DB_HOST: postgres
      ATLAS_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ATLAS_KAFKA_BOOTSTRAP: kafka:9092
      ATLAS_JWT_SECRET: ${ATLAS_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    profiles: ["app"]

  workflow-service:
    build:
      context: ..
      dockerfile: Dockerfile
      target: workflow
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ATLAS_DB_HOST: postgres
      ATLAS_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ATLAS_KAFKA_BOOTSTRAP: kafka:9092
      ATLAS_JWT_SECRET: ${ATLAS_JWT_SECRET}
      ATLAS_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  worker-service:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ATLAS_DB_HOST: postgres
      ATLAS_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ATLAS_KAFKA_BOOTSTRAP: kafka:9092
      ATLAS_JWT_SECRET: ${ATLAS_JWT_SECRET}
      ATLAS_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["app"]

  audit-service:
    build:
      context: ..
      dockerfile: Dockerfile
      target: audit
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ATLAS_DB_HOST: postgres
      ATLAS_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ATLAS_KAFKA_BOOTSTRAP: kafka:9092
      ATLAS_JWT_SECRET: ${ATLAS_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    profiles: ["app"]

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  prometheus_data:
  grafana_data:
  tempo_data:
